name: "Vinyl Listener"
version: "1.1.1"
slug: "vinyl_listener"
description: "Captures audio and publishes Shazam/ACRCloud metadata to MQTT."
arch:
  - aarch64
  - amd64
startup: application
boot: auto
homeassistant_api: true
audio: true
options:
  mqtt_host: ""
  mqtt_user: ""
  mqtt_password: ""
  acr_access_key: ""
  acr_access_secret: ""
  turntable_entity: "switch.turntable"
  silence_gap_seconds: 2
schema:
  mqtt_host: str
  mqtt_user: str
  mqtt_password: password
  acr_access_key: str?
  acr_access_secret: str?
  turntable_entity: match(^switch\..+)
  silence_gap_seconds: int
